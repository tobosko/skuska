<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styly.css">
</head>
<body>
    <div class="Hlavicka">
        <h1>Vitajte na mojej stranke</h1>
        <button class="logout-btn" onclick="odhlasit()">
            <b>Odhlásiť sa</b>
        </button>
    </div>
    <div class="Container">
        <div class="Meno"><b>Prihlaseny cez: <b id="email"></b></b></div>
    </div>

    <div class="formular">

        <input id="meno" placeholder="Meno">

        <input id="vek" type="number" placeholder="Vek">

        <input id="mesto" placeholder="Mesto">

        <button onclick="odoslatFormular()">
            Odoslať
        </button>
    </div>


    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
    // Firebase config
    const firebaseConfig = {

        apiKey: "AIzaSyCVGGZN44AymLC3m0rSWvoYTQ1dL8hZd_A",

        authDomain: "web-app-3b87c.firebaseapp.com",

        projectId: "web-app-3b87c",

        storageBucket: "web-app-3b87c.appspot.com",

        messagingSenderId: "9585236090",

        appId: "1:9585236090:web:7e61314446b7d52b3683c3",

        measurementId: "G-66T6L53E2Y"
    };

    // Init Firebase
    firebase.initializeApp(firebaseConfig);

    // Auth
    const auth = firebase.auth();

    // Kontrola používateľa
    auth.onAuthStateChanged(user => {

        if (user) {

            // Zobrazenie emailu
            document.getElementById("email")
                .textContent = user.email;

        } else {

            // Ak nie je login
            window.location.href = "index.html";
        }
    });

    // Logout
    function odhlasit() {

        auth.signOut()

            .then(() => {

                window.location.href = "index.html";

            });
    }

    async function odoslatFormular() {

        const meno =
            document.getElementById("meno").value;

        const vek =
            document.getElementById("vek").value;

        const mesto =
            document.getElementById("mesto").value;

        try {

            await db.collection("formular").add({

                meno: meno,

                vek: vek,

                mesto: mesto,

                email: auth.currentUser.email,

                cas: new Date()
            });

            alert("Údaje uložené");

        } catch (err) {

            alert(err.message);
        }
}

</script>
</body>
</html>
