<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styly.css">
</head>
<body>
    <div class="Hlavicka">
        <h1>Vitajte na mojej stranke</h1>
        <button class="logout-btn" onclick="odhlasit()">
            <b>Odhlásiť sa</b>
        </button>
    </div>
    <div class="Container">
        <div class="Meno"><b>Tobias Tomko</b></div>
    </div>


    <script>

    // Firebase config
    const firebaseConfig = {

        apiKey: "TVOJ_API_KEY",

        authDomain: "TVOJ_PROJEKT.firebaseapp.com",

        projectId: "TVOJ_PROJEKT",

        storageBucket: "TVOJ_PROJEKT.appspot.com",

        messagingSenderId: "XXXX",

        appId: "XXXX"
    };

    // Init Firebase
    firebase.initializeApp(firebaseConfig);

    // NAJPRV auth
    const auth = firebase.auth();

    // AŽ POTOM funkcia
    function odhlasit() {

        auth.signOut()

            .then(() => {

                window.location.href = "index.html";

            });
    }

</script>
</body>
</html>
