<!DOCTYPE html>
<html>
<head>
    <title>Moja Firebase App</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input { padding: 8px; display: block; margin: 10px 0; width: 200px; }
        button { padding: 8px 15px; cursor: pointer; margin: 5px 5px 5px 0; }
        #login { display: block; }
        #app { display: none; }
    </style>
</head>
<body>
    <div id="login">
        <h2>Prihlásenie</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Heslo">
        <button onclick="prihlasit()">Prihlásiť</button>
        <button onclick="registrovat()">Registrovať</button>
    </div>

    <div id="app">
        <h1>Moja Firebase App</h1>
        <button onclick="odhlasit()">Odhlásiť sa</button>
        <input id="txt" placeholder="Napíš niečo">
        <button onclick="uloz()">Ulož</button>
        <ul id="zoznam"></ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVGGZN44AymLC3m0rSWvoYTQ1dL8hZd_A",
            authDomain: "web-app-3b87c.firebaseapp.com",
            projectId: "web-app-3b87c",
            storageBucket: "web-app-3b87c.firebasestorage.app",
            messagingSenderId: "9585236090",
            appId: "1:9585236090:web:7e61314446b7d52b3683c3",
            measurementId: "G-66T6L53E2Y"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById("login").style.display = "none";
                document.getElementById("app").style.display = "block";
                nacitaj();
            } else {
                document.getElementById("login").style.display = "block";
                document.getElementById("app").style.display = "none";
            }
        });

        function registrovat() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => window.location.href = "app.html")
                .catch(err => alert("Chyba: " + err.message));
        }

        function prihlasit() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => window.location.href = "app.html")
                .catch(err => alert("Chyba: " + err.message));
        }

        function odhlasit() {
            auth.signOut();
        }

        async function uloz() {
            const text = document.getElementById("txt").value;
            if (text) {
                await db.collection("data").add({text: text});
                document.getElementById("txt").value = "";
                nacitaj();
            }
        }

        async function nacitaj() {
            const snapshot = await db.collection("data").getDocs();
            document.getElementById("zoznam").innerHTML = "";
            snapshot.forEach(doc => {
                const li = document.createElement("li");
                li.textContent = doc.data().text;
                document.getElementById("zoznam").appendChild(li);
            });
        }
    </script>
</body>
</html>
