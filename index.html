<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Firebase App</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            display: block;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            margin: 5px 5px 5px 0;
            width: 100%;
        }

        hr {
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login" class="box">

        <h2>Prihlásenie</h2>

        <input
            id="email"
            type="email"
            placeholder="Email"
        >

        <input
            id="password"
            type="password"
            placeholder="Heslo"
        >

        <button onclick="prihlasit()">
            Prihlásiť
        </button>

        <button onclick="registrovat()">
            Registrovať
        </button>

        <hr>

        <button onclick="googleLogin()">
            Prihlásiť cez Google
        </button>

    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>

        // Firebase config
        const firebaseConfig = {

            apiKey: "AIzaSyCVGGZN44AymLC3m0rSWvoYTQ1dL8hZd_A",

            authDomain: "web-app-3b87c.firebaseapp.com",

            projectId: "web-app-3b87c",

            storageBucket: "web-app-3b87c.appspot.com",

            messagingSenderId: "9585236090",

            appId: "1:9585236090:web:7e61314446b7d52b3683c3",

            measurementId: "G-66T6L53E2Y"
        };

        // Init Firebase
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();

        // AK JE UŽ PRIHLÁSENÝ
        auth.onAuthStateChanged(user => {

            if (user) {

                // PRESMEROVANIE
                window.location.href = "app.html";
            }
        });

        // REGISTRÁCIA
        function registrovat() {

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            auth.createUserWithEmailAndPassword(
                email,
                password
            )

            .then(() => {

                // PRESMEROVANIE
                window.location.href = "app.html";

            })

            .catch(err => {

                alert("Chyba: " + err.message);

            });
        }

        // LOGIN
        function prihlasit() {

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            auth.signInWithEmailAndPassword(
                email,
                password
            )

            .then(() => {

                // PRESMEROVANIE
                window.location.href = "app.html";

            })

            .catch(err => {

                alert("Chyba: " + err.message);

            });
        }

        // GOOGLE LOGIN
        function googleLogin() {

            const provider =
                new firebase.auth.GoogleAuthProvider();

            auth.signInWithPopup(provider)

            .then(() => {

                // PRESMEROVANIE
                window.location.href = "app.html";

            })

            .catch(error => {

                alert("Chyba: " + error.message);

            });
        }

    </script>

</body>
</html>
